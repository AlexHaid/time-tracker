# ============================================
# Time Tracker — Docker Compose for Static Site
# ============================================
#
# Usage:
#   docker compose up -d --build   → Build and start
#   docker compose logs -f          → View logs
#   docker compose down             → Stop
#
# The app is fully client-side (no server, no database).
# Data lives in the browser's localStorage.
# Use Import/Export to back up and transfer data.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: time-tracker
    restart: unless-stopped
    ports:
      - "3000:80"
